name: Build & Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: termtok-linux-x86_64
          - os: macos-latest
            artifact: termtok-macos-arm64
          - os: macos-15-intel
            artifact: termtok-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install numpy opencv-python-headless pyinstaller

      - name: Stamp version from tag
        run: sed -i "s/__version__ = \".*\"/__version__ = \"${{ github.ref_name }}\"/" termtok/__init__.py

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name ${{ matrix.artifact }} \
            --hidden-import=cv2 \
            --collect-all=cv2 \
            --collect-submodules=termtok \
            run.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist/*

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
